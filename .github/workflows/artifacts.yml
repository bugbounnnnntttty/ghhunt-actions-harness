name: artifacts-audit
on:
  push:
    branches: [main, 'artifacts/**']
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  upload_traversal:
    runs-on: ubuntu-latest
    steps:
      - name: Create files with weird paths
        run: |
          mkdir -p work/normal work/trickydir
          cd work
          echo "normal-content" > normal/ok.txt
          echo "TRAVERSAL" > trickydir/..evil.txt
          # Create a file with literal '../' in the name using printf tricks
          # Cannot create '../evil' via shell cleanly, but upload-artifact@v4 has its own rel-path handling
          ls -la normal trickydir
          echo "--"
          pwd
      - name: Upload normal
        uses: actions/upload-artifact@v4
        with:
          name: normal-artifact
          path: work/normal/*
          if-no-files-found: error
      - name: Upload with ../ in path expression
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: traversal-artifact
          path: |
            work/trickydir/..evil.txt
            work/normal/../normal/ok.txt
          if-no-files-found: warn
      - name: Upload with absolute path
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: abs-artifact
          path: /etc/hostname
          if-no-files-found: error
      - name: Upload with symlink
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: symlink-artifact
          include-hidden-files: true
          path: work/linked
      - name: Make a symlink to /etc
        run: |
          ln -s /etc work/linked || true
          ls -la work/

  download_introspect:
    needs: upload_traversal
    runs-on: ubuntu-latest
    steps:
      - name: Download into isolated dir
        uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Inspect
        run: |
          find dl -maxdepth 5 -type f | head -30
          echo "-- tree --"
          find dl -maxdepth 5 | head -40
          echo "-- sizes --"
          du -a dl 2>/dev/null | head -20
      - name: Also test raw API download with traversal fname
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -s -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/actions/artifacts" | python3 -c '
import sys,json
d = json.load(sys.stdin)
for a in d.get("artifacts", []):
    print(a.get("name"), a.get("size_in_bytes"), a.get("archive_download_url"))
' | head -20
