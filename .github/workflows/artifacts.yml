name: artifacts-audit
on:
  push:
    branches: [main, 'artifacts/**']
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  upload_traversal:
    runs-on: ubuntu-latest
    steps:
      - name: Create weird files
        shell: bash
        run: |
          mkdir -p work/normal work/trickydir
          echo "normal-content" > work/normal/ok.txt
          echo "dot-dot-prefix" > work/trickydir/..evil.txt
          echo "newline-in-name" > 'work/trickydir/weird  name.txt'
          mkdir -p work/deep/a/b/c
          echo "deep" > work/deep/a/b/c/leaf.txt
          ln -s /etc work/linked_etc || true
          ls -la work/ work/normal work/trickydir work/deep/a/b/c

      - name: Upload normal artifact
        uses: actions/upload-artifact@v4
        with:
          name: normal-artifact
          path: work/normal/*
          if-no-files-found: error

      - name: Upload with ../ in path expression
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: traversal-artifact
          path: |
            work/trickydir/..evil.txt
            work/normal/../normal/ok.txt
          if-no-files-found: warn

      - name: Upload an absolute path
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: abs-artifact
          path: /etc/hostname
          if-no-files-found: error

      - name: Upload symlink target (should fail by default)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: symlink-artifact
          path: work/linked_etc/hostname
          if-no-files-found: error

  download_introspect:
    needs: upload_traversal
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts into dl/
        uses: actions/download-artifact@v4
        with:
          path: dl

      - name: Inspect layout
        shell: bash
        run: |
          echo "=== tree ==="
          find dl -maxdepth 6 | head -40
          echo "=== files ==="
          find dl -maxdepth 6 -type f -exec ls -la {} \; | head -30
          echo "=== sizes ==="
          du -a dl 2>/dev/null | head -30

      - name: API artifact list
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?per_page=30" > /tmp/arts.json
          python3 -c "import json; d=json.load(open('/tmp/arts.json')); [print(a['name'], a['size_in_bytes'], a['archive_download_url']) for a in d.get('artifacts', [])]"
