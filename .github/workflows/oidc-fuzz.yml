name: oidc-fuzz
on:
  push:
    branches: [main, 'oidc-fuzz/**']
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  fuzz_claims:
    runs-on: ubuntu-latest
    steps:
      - name: Write fuzz script
        shell: bash
        run: |
          cat > /tmp/fuzz.py <<'PY'
          import os, json, base64, urllib.parse, urllib.request

          req_token = os.environ['ACTIONS_ID_TOKEN_REQUEST_TOKEN']
          req_url = os.environ['ACTIONS_ID_TOKEN_REQUEST_URL']

          fuzz_values = [
              'a\r\ninjected:1',
              'a\x00b',
              'with space',
              '{"not":"json"}',
              'aud\ttab',
              'sub:repo:admin',
              'https://evil.invalid',
              'DROP TABLE x;--',
              'a' * 2000,
              '',
          ]

          for aud in fuzz_values:
              url = req_url + ('&' if '?' in req_url else '?') + 'audience=' + urllib.parse.quote(aud, safe='')
              req = urllib.request.Request(url, headers={'Authorization': f'Bearer {req_token}'})
              try:
                  body = urllib.request.urlopen(req).read().decode()
              except Exception as e:
                  print(f"AUD={aud!r} ERROR {e}")
                  continue
              data = json.loads(body)
              tok = data.get('value','')
              if not tok:
                  print(f"AUD={aud!r} NO_TOKEN body={body[:200]!r}")
                  continue
              pay = tok.split('.')[1]
              pay += '=' * ((4 - len(pay) % 4) % 4)
              claim = json.loads(base64.urlsafe_b64decode(pay).decode())
              got = claim.get('aud')
              hexgot = got.encode('utf-8', errors='replace').hex() if got else ''
              print(f"AUD_SENT={aud!r}")
              print(f"  AUD_IN_CLAIM_HEX={hexgot}")
              print(f"  AUD_IN_CLAIM_REPR={got!r}")
              print(f"  sub={claim.get('sub')!r}")
              print(f"  iss={claim.get('iss')!r}")
          PY
          python3 /tmp/fuzz.py
