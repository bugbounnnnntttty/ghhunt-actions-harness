name: oidc-audit
on:
  push:
    branches: [main, 'oidc/**']
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  oidc_claims:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch default audience token and decode
        shell: bash
        run: |
          set -e
          REQ_TOKEN="${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          RESP=$(curl -sS -H "Authorization: Bearer $REQ_TOKEN" "$REQ_URL")
          TOK=$(printf "%s" "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('value',''))")
          if [ -z "$TOK" ]; then echo NOTOKEN; echo RESP=$RESP; exit 1; fi
          PAY=$(printf "%s" "$TOK" | cut -d. -f2)
          PAD=$((4 - ${#PAY} % 4))
          if [ $PAD -lt 4 ]; then PAY="${PAY}$(printf '=%.0s' $(seq 1 $PAD))"; fi
          echo "--- default audience claims ---"
          printf "%s" "$PAY" | tr -- '-_' '+/' | base64 -d 2>/dev/null | python3 -m json.tool

      - name: Fetch with custom audiences
        shell: bash
        run: |
          set -e
          REQ_TOKEN="${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          for AUD in myservice aws-sts.amazonaws.com sts.amazonaws.com attacker.example api.github.com actions.githubusercontent.com 'https://evil.invalid/abc' ; do
            echo "==== audience='$AUD' ===="
            RESP=$(curl -sS -G --data-urlencode "audience=$AUD" -H "Authorization: Bearer $REQ_TOKEN" "$REQ_URL")
            TOK=$(printf "%s" "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('value',''))")
            if [ -z "$TOK" ]; then echo "no token: $RESP"; continue; fi
            PAY=$(printf "%s" "$TOK" | cut -d. -f2)
            PAD=$((4 - ${#PAY} % 4))
            if [ $PAD -lt 4 ]; then PAY="${PAY}$(printf '=%.0s' $(seq 1 $PAD))"; fi
            printf "%s" "$PAY" | tr -- '-_' '+/' | base64 -d 2>/dev/null | python3 -c "import sys,json; c=json.load(sys.stdin); print('  iss:',c.get('iss')); print('  sub:',c.get('sub')); print('  aud:',c.get('aud')); print('  repository:',c.get('repository')); print('  ref:',c.get('ref')); print('  workflow_ref:',c.get('workflow_ref')); print('  job_workflow_ref:',c.get('job_workflow_ref')); print('  repository_visibility:',c.get('repository_visibility')); print('  event_name:',c.get('event_name'))"
          done

      - name: Audience injection - null bytes and CRLF
        shell: bash
        run: |
          set -e
          REQ_TOKEN="${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          for FUZZ in "a%0b" "a%0d%0ainjected:true" "a%00b" "a b" "a,b" "a|b" ; do
            echo "==== fuzz aud='$FUZZ' ===="
            RESP=$(curl -sS -G --data-urlencode "audience=$FUZZ" -H "Authorization: Bearer $REQ_TOKEN" "$REQ_URL")
            echo "$RESP" | head -c 500
            echo
          done

      - name: Issuer metadata
        run: curl -sS https://token.actions.githubusercontent.com/.well-known/openid-configuration | python3 -m json.tool | head -30
