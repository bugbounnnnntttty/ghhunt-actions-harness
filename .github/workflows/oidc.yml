name: oidc-audit
on:
  push:
    branches: [main, 'oidc/**']
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  oidc_claims:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch OIDC token with default audience
        id: default_aud
        run: |
          REQ_TOKEN="${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          RESP=$(curl -sS -H "Authorization: Bearer $REQ_TOKEN" "$REQ_URL")
          TOK=$(echo "$RESP" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("value",""))')
          if [ -z "$TOK" ]; then echo "NO_TOKEN" >&2; exit 1; fi
          HDR=$(echo "$TOK" | cut -d. -f1 | tr '_-' '/+' | base64 -d 2>/dev/null || true)
          PAY=$(echo "$TOK" | cut -d. -f2)
          # pad for base64
          case $((${#PAY} % 4)) in 2) PAY="$PAY==" ;; 3) PAY="$PAY=" ;; esac
          PAYJ=$(echo "$PAY" | tr '_-' '/+' | base64 -d 2>/dev/null)
          echo "== DEFAULT AUDIENCE =="
          echo "$HDR"
          echo "$PAYJ" | python3 -m json.tool
      - name: Fetch with custom audience
        run: |
          REQ_TOKEN="${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          for AUD in "myservice" "aws-sts.amazonaws.com" "sts.amazonaws.com" "https://evil.invalid/abc" "api.github.com" "actions.githubusercontent.com" '' '""'; do
            echo "---- aud='$AUD' ----"
            RESP=$(curl -sS -G --data-urlencode "audience=$AUD" -H "Authorization: Bearer $REQ_TOKEN" "$REQ_URL")
            TOK=$(echo "$RESP" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("value",""))' 2>/dev/null || echo "")
            if [ -z "$TOK" ]; then echo "RESP: $RESP"; continue; fi
            PAY=$(echo "$TOK" | cut -d. -f2)
            case $((${#PAY} % 4)) in 2) PAY="$PAY==" ;; 3) PAY="$PAY=" ;; esac
            PAYJ=$(echo "$PAY" | tr '_-' '/+' | base64 -d 2>/dev/null)
            echo "$PAYJ" | python3 -c 'import sys,json
d=json.load(sys.stdin)
print("  sub:",d.get("sub"))
print("  aud:",d.get("aud"))
print("  iss:",d.get("iss"))
print("  repository:",d.get("repository"))
print("  ref:",d.get("ref"))
print("  job_workflow_ref:",d.get("job_workflow_ref"))
print("  workflow_ref:",d.get("workflow_ref"))
'
          done
      - name: Alt JWKS check (ensure issuer is fixed)
        run: |
          curl -s https://token.actions.githubusercontent.com/.well-known/openid-configuration | python3 -m json.tool | head -20
